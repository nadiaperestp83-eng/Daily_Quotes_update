name: Dart CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter (includes Dart)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install package dependencies
        run: dart pub get

      - name: Analyze package (checks for the export bug)
        run: dart analyze

      - name: Run package tests
        run: dart test

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze
